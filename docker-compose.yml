version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarttravel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongo:
    image: mongo:6
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"

  node-backend:
    build:
      context: ./back
      dockerfile: node.Dockerfile
    env_file:
      - ./back/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
    restart: unless-stopped

  fastapi:
    build:
      context: ./back
      dockerfile: Dockerfile
    env_file:
      - ./back/.env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    restart: unless-stopped

  front:
    image: node:18
    working_dir: /app
    volumes:
      - ./front:/app:cached
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://node-backend:8000
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    depends_on:
      - node-backend

volumes:
  pgdata:
  mongodata:
